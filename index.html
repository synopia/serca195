<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost Ark Serca x195</title>
  <style>
    :root {
      --arena-width: 420px;
      --arena-height: 600px;
      --rows: 6;
      --row-gap: 8px;
      --bg: #111827;
      --panel: #1f2937;
      --line: #374151;
      --wall: #ef4444;
      --wall-dark: #b91c1c;
      --player: #22c55e;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --duration: 700ms;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
              radial-gradient(circle at top, #1f2937, #0b1020 60%),
              #0b1020;
      color: var(--text);
      font-family: system-ui, sans-serif;
    }

    .app {
      display: grid;
      gap: 16px;
      justify-items: center;
    }

    .arena {
      position: relative;
      width: var(--arena-width);
      height: var(--arena-height);
      padding: 12px;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid #334155;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .rows {
      position: relative;
      height: 100%;
      display: grid;
      grid-template-rows: repeat(var(--rows), 1fr);
      gap: var(--row-gap);
    }

    .row {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background:
              linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)),
              var(--panel);
      border: 1px solid var(--line);
    }

    .row-label {
      position: absolute;
      left: 10px;
      top: 8px;
      font-size: 12px;
      color: var(--muted);
      z-index: 4;
      pointer-events: none;
    }

    /* Mittelbereich / "sicherer" Laufbereich */
    .lane {
      position: absolute;
      inset: 0;
      background:
              linear-gradient(
                      90deg,
                      transparent 0%,
                      transparent 25%,
                      rgba(255,255,255,0.03) 25%,
                      rgba(255,255,255,0.03) 75%,
                      transparent 75%,
                      transparent 100%
              );
    }

    .wall {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      background:
              linear-gradient(180deg, var(--wall), var(--wall-dark));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      transition: transform var(--duration) linear;
      will-change: transform;
      z-index: 2;
    }

    .wall.left {
      left: 0;
      transform: translateX(calc(-100% + var(--close, 0) * 100%));
    }

    .wall.right {
      right: 0;
      transform: translateX(calc(100% - var(--close, 0) * 100%));
    }

    /* Visuelle Mitte */
    .center-line {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.08);
      z-index: 1;
    }

    /* Spieler */
    .player {
      position: absolute;
      left: 50%;
      width: 38px;
      height: 38px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
              radial-gradient(circle at 35% 35%, #86efac, var(--player));
      border: 2px solid rgba(255,255,255,0.75);
      box-shadow:
              0 0 0 4px rgba(34, 197, 94, 0.15),
              0 0 18px rgba(34, 197, 94, 0.45);
      z-index: 5;
      transition: top 180ms ease;
      pointer-events: none;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: #334155;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #475569;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      max-width: 700px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="arena" id="arena">
    <div class="rows" id="rows"></div>
    <div class="player" id="player"></div>
  </div>

  <div class="controls">
    <button id="resetBtn">Reset</button>
    <button id="pattern1">Pattern 1</button>
    <button id="pattern2">Pattern 2</button>
    <button id="pattern3">Pattern 3</button>
    <button id="pattern4">Pattern 4</button>
  </div>

  <div class="hint">
    Pfeiltasten ↑ / ↓ bewegen den Spieler.
    Die eigentlichen 3 Serca-Muster kannst du später in <code>runCustomPattern()</code>
    selbst definieren.
  </div>
</div>

<script>
  const ROW_COUNT = 6;
  const rowsEl = document.getElementById("rows");
  const playerEl = document.getElementById("player");

  const rows = [];
  let playerRow = 2; // 0..5

  function createRows() {
    for (let i = 0; i < ROW_COUNT; i++) {
      const row = document.createElement("div");
      row.className = "row";
      row.dataset.index = i;

      const label = document.createElement("div");
      label.className = "row-label";
      label.textContent = `Lane ${(i%3) + 1}`;

      const lane = document.createElement("div");
      lane.className = "lane";

      const centerLine = document.createElement("div");
      centerLine.className = "center-line";

      const wallLeft = document.createElement("div");
      wallLeft.className = "wall left";

      const wallRight = document.createElement("div");
      wallRight.className = "wall right";

      row.append(label, lane, centerLine, wallLeft, wallRight);
      rowsEl.appendChild(row);

      rows.push({
        el: row,
        left: wallLeft,
        right: wallRight,
        close: 0
      });
    }
  }

  function getRowCenterY(rowIndex) {
    const rowRect = rows[rowIndex].el.getBoundingClientRect();
    const arenaRect = document.getElementById("arena").getBoundingClientRect();
    return rowRect.top - arenaRect.top + rowRect.height / 2;
  }

  function renderPlayer() {
    playerEl.style.top = `${getRowCenterY(playerRow)}px`;
  }

  function movePlayer(delta) {
    playerRow = Math.max(0, Math.min(ROW_COUNT - 1, playerRow + delta));
    renderPlayer();
  }

  // close = 0 -> offen
  // close = 1 -> komplett geschlossen
  function setWall(rowIndex, close) {
    const row = rows[rowIndex];
    row.close = Math.max(0, Math.min(1, close));
    row.left.style.setProperty("--close", row.close);
    row.right.style.setProperty("--close", row.close);
  }

  function setWallDuration(rowIndex, ms) {
    const row = rows[rowIndex];
    row.left.style.transitionDuration = `${ms}ms`;
    row.right.style.transitionDuration = `${ms}ms`;
  }

  function animateWall(rowIndex, to, duration = 700) {
    setWallDuration(rowIndex, duration);
    requestAnimationFrame(() => {
      setWall(rowIndex, to);
    });
  }

  function resetWalls(duration = 250) {
    for (let i = 0; i < ROW_COUNT; i++) {
      animateWall(i, 0, duration);
    }
  }

  function closeAll(duration = 700) {
    for (let i = 0; i < ROW_COUNT; i++) {
      animateWall(i, 1, duration);
    }
  }

  async function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function waveDemo() {
    resetWalls(100);
    await sleep(150);

    for (let i = 0; i < ROW_COUNT; i++) {
      animateWall(i, 1, 300);
      await sleep(120);
    }

    await sleep(400);

    for (let i = 0; i < ROW_COUNT; i++) {
      animateWall(i, 0, 250);
      await sleep(80);
    }
  }

  // Hier kannst du später deine 3 echten Muster umsetzen.
  // Beispiel-Struktur:
  // [
  //   { t: 0,   row: 0, to: 1, duration: 500 },
  //   { t: 0,   row: 1, to: 1, duration: 500 },
  //   { t: 250, row: 2, to: 1, duration: 500 },
  //   ...
  // ]
  async function runPattern(steps) {
    resetWalls(100);

    const start = performance.now();

    await Promise.all(
            steps.map(step => {
              return new Promise(resolve => {
                setTimeout(() => {
                  animateWall(step.row, step.to, step.duration ?? 600);
                  resolve();
                }, step.t);
              });
            })
    );

    return performance.now() - start;
  }

  async function runPattern1() {
    const steps = [
      { t: 0, row: 0, to: 1, duration: 500 },
      { t: 0, row: 3, to: 1, duration: 500 },
      { t: 1000, row: 2, to: 1, duration: 500 },
      { t: 1000, row: 5, to: 1, duration: 500 },
      { t: 2000, row: 1, to: 1, duration: 500 },
      { t: 2000, row: 4, to: 1, duration: 500 },
      { t: 2000, row: 0, to: 0, duration: 500 },
      { t: 2000, row: 3, to: 0, duration: 500 },
    ];

    await runPattern(steps);
  }
  async function runPattern2() {
    const steps = [
      { t: 0, row: 1, to: 1, duration: 500 },
      { t: 0, row: 3, to: 1, duration: 500 },
      { t: 0, row: 5, to: 1, duration: 500 },
      { t: 1000, row: 0, to: 1, duration: 250 },
      { t: 1000, row: 1, to: 0, duration: 250 },
      { t: 1000, row: 2, to: 1, duration: 250 },
      { t: 1000, row: 3, to: 0, duration: 250 },
      { t: 1000, row: 4, to: 1, duration: 250 },
      { t: 1000, row: 5, to: 0, duration: 250 },
      { t: 2000, row: 0, to: 0, duration: 250 },
      { t: 2000, row: 1, to: 1, duration: 250 },
      { t: 2000, row: 2, to: 0, duration: 250 },
      { t: 2000, row: 3, to: 1, duration: 250 },
      { t: 2000, row: 4, to: 0, duration: 250 },
      { t: 2000, row: 5, to: 1, duration: 250 },
    ];

    await runPattern(steps);
  }

  async function runPattern3() {
    const steps = [
      { t: 0, row: 0, to: 1, duration: 250 },
      { t: 250, row: 1, to: 1, duration: 250 },
      { t: 500, row: 2, to: 1, duration: 250 },
      { t: 750, row: 3, to: 1, duration: 250 },
      { t: 1000, row: 4, to: 1, duration: 250 },
    ];

    await runPattern(steps);
  }


  async function runPattern4() {
    const steps = [
      { t: 0, row: 5, to: 1, duration: 250 },
      { t: 250, row: 4, to: 1, duration: 250 },
      { t: 500, row: 3, to: 1, duration: 250 },
      { t: 750, row: 2, to: 1, duration: 250 },
      { t: 1000, row: 1, to: 1, duration: 250 },
    ];

    await runPattern(steps);
  }


  document.getElementById("resetBtn").addEventListener("click", () => {
    resetWalls();
    playerRow = 2;
    renderPlayer();
  });

  // document.getElementById("demoCloseBtn").addEventListener("click", () => {
  //     closeAll();
  // });
  //
  // document.getElementById("demoWaveBtn").addEventListener("click", () => {
  //     waveDemo();
  // });

  document.getElementById("pattern1").addEventListener("click", () => {
    runPattern1();
  });
  document.getElementById("pattern2").addEventListener("click", () => {
    runPattern2();
  });
  document.getElementById("pattern3").addEventListener("click", () => {
    runPattern3();
  });
  document.getElementById("pattern4").addEventListener("click", () => {
    runPattern4();
  });

  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp") {
      movePlayer(-1);
    } else if (e.key === "ArrowDown") {
      movePlayer(1);
    }
  });

  createRows();
  resetWalls(0);
  renderPlayer();

  window.addEventListener("resize", renderPlayer);
</script>
</body>
</html>
